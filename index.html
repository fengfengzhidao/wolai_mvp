<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wolai_mvp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <header class="sidebar-header">
          <div>
            <p class="workspace-label">个人空间</p>
            <h1>wolai_mvp</h1>
          </div>
          <button class="new-page-button" type="button" id="newPageButton">新建</button>
        </header>

        <section class="page-list-panel" aria-label="页面列表">
          <p class="section-title">页面</p>
          <div class="page-list" id="pageList"></div>
          <p class="empty-list" id="emptyList">还没有页面</p>
        </section>
      </aside>

      <section class="editor-pane" aria-label="页面编辑区">
        <div class="editor-inner">
          <div class="editor-meta">
            <span id="updatedAtLabel">尚未保存</span>
            <span class="editor-status" id="saveStatus">已保存</span>
          </div>
          <input
            class="title-input"
            id="titleInput"
            type="text"
            placeholder="未命名页面"
            autocomplete="off"
          />
          <textarea
            class="content-input"
            id="contentInput"
            placeholder="开始记录..."
          ></textarea>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
